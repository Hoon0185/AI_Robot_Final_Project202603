# twist_mux configuration for patrol_main integration
# Priority: Obstacle (100) > Teleop (80) > Navigation (10)

sampler_rate: 10.0

topics:
  - name: "obstacle"
    topic: "/cmd_vel_obstacle"
    timeout: 0.5
    priority: 100
  - name: "teleop"
    topic: "/cmd_vel_teleop"
    timeout: 0.5
    priority: 80
  - name: "navigation"
    topic: "/cmd_vel_nav"
    timeout: 0.5
    priority: 10
